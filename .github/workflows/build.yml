
name: Build APK (ARM64 Only)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. دانلود سورس‌کد پروژه
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # 2. نصب جاوا 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 3. نصب SDK اندروید
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 4. نصب ابزارهای سیستم عامل
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build nasm pkg-config build-essential

    # 5. نصب CMake
    - name: Install Android CMake
      run: |
        sdkmanager --install "cmake;3.22.1"
        echo "$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH

    # 6. نصب NDK 26
    - name: Install NDK
      run: |
        yes | sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

    # 7. اصلاح اتوماتیک فایل build.gradle.kts
    # این مرحله تداخل splits را حل کرده و فقط arm64 را فعال می‌کند
    - name: Configure build.gradle.kts
      run: |
        echo "Fixing build.gradle.kts configurations..."
        
        # 1. تنظیم نسخه صحیح NDK
        sed -i 's/ndkVersion.*/ndkVersion = "26.1.10909125"/' app/build.gradle.kts
        
        # 2. حذف خطی که باعث تداخل می‌شود (include های قدیمی داخل splits)
        # دستور زیر هر خطی که شامل "include" و "armeabi" باشد را پاک می‌کند
        sed -i '/include.*armeabi.*x86.*/d' app/build.gradle.kts
        
        # 3. اضافه کردن فیلتر فقط برای ARM64 در defaultConfig
        sed -i '/defaultConfig {/a \        ndk { abiFilters += "arm64-v8a" }' app/build.gradle.kts

    # 8. نصب Rust برای معماری ARM64
    - name: Install Rust Targets
      run: rustup target add aarch64-linux-android

    # 9. مجوز اجرا به گریدل
    - name: Grant execute permission
      run: chmod +x gradlew

    # 10. ساخت فایل APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    # 11. آپلود فایل خروجی
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: slipstream-arm64-apk
        path: app/build/outputs/apk/debug/*.apk
