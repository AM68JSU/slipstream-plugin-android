
name: Build APK

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. دانلود سورس‌کد پروژه
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # 2. نصب جاوا
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 3. نصب SDK اندروید
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 4. نصب ابزارهای پیش‌نیاز (OpenSSL, C++, etc)
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build nasm pkg-config build-essential

    # 5. نصب CMake مخصوص اندروید
    - name: Install Android CMake
      run: |
        sdkmanager --install "cmake;3.22.1"
        echo "$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH

    # 6. نصب NDK نسخه 26 (نسخه پایدار)
    - name: Install NDK
      run: |
        yes | sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

    # 7. اصلاح فایل build.gradle.kts (نسخه کاتلین)
    # تغییر نام فایل به .kts و تغییر سینتکس به فرمت کاتلین
    - name: Configure build.gradle.kts for NDK 26 and ARM64
      run: |
        # تغییر نسخه NDK
        sed -i 's/ndkVersion.*/ndkVersion = "26.1.10909125"/' app/build.gradle.kts
        
        # اضافه کردن فیلتر برای ساخت فقط نسخه ARM64 (مخصوص اندروید 11)
        # در کاتلین از += برای اضافه کردن به لیست استفاده می‌شود
        sed -i '/defaultConfig {/a \        ndk { abiFilters += "arm64-v8a" }' app/build.gradle.kts

    # 8. نصب تارگت‌های Rust
    - name: Install Rust Targets
      run: rustup target add aarch64-linux-android

    # 9. مجوز اجرا
    - name: Grant execute permission
      run: chmod +x gradlew

    # 10. شروع عملیات ساخت
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 11. آپلود فایل APK ساخته شده
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: slipstream-arm64-apk
        path: app/build/outputs/apk/debug/*.apk
