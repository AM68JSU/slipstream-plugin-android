name: Build APK (Max Resource Limit)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # محدودیت سختگیرانه منابع
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false -Dkotlin.daemon.jvm.options=-Xmx1024m"
      CARGO_BUILD_JOBS: "1"
      RUSTFLAGS: "-C codegen-units=1 -C linker-args=-Wl,-O1" # لینک کردن بهینه شده
      # استفاده از یک متغیر برای مدیریت منابع
      RUST_CARGO_OPTS: " --jobs 1 --config profile.release.lto=true" # LTO برای لینک بهتر

    steps:
    # مرحله 1: دیگر Swap ایجاد نمی‌کنیم
    
    # 2. دانلود سورس‌کد
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # 3. نصب جاوا 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 4. نصب SDK اندروید
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 5. نصب ابزارهای بیلد
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build nasm pkg-config build-essential python3

    # 6. نصب CMake پایدار
    - name: Install Android CMake
      run: |
        sdkmanager --install "cmake;3.22.1"
        echo "$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH

    # 7. نصب NDK پایدار
    - name: Install NDK
      run: |
        yes | sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

    # 8. اصلاح فایل build.gradle.kts با پایتون
    - name: Fix build.gradle.kts
      shell: python
      run: |
        import re
        file_path = "app/build.gradle.kts"
        
        with open(file_path, "r") as f:
            content = f.read()
        
        content = re.sub(r'ndkVersion\s*=\s*".*"', 'ndkVersion = "26.1.10909125"', content)
        content = content.replace('isEnable = true', 'isEnable = false')
        if 'abiFilters' not in content:
            content = content.replace('defaultConfig {', 'defaultConfig {\n        ndk { abiFilters += "arm64-v8a" }')
            
        with open(file_path, "w") as f:
            f.write(content)
        print("Build file patched successfully.")

    # 9. نصب Rust فقط برای ARM64 (حذف بقیه برای جلوگیری از تداخل)
    - name: Install Rust Targets
      run: rustup target add aarch64-linux-android

    # 10. مجوز اجرا
    - name: Grant execute permission
      run: chmod +x gradlew

    # 11. ساخت فایل APK
    # استفاده از متغیر محیطی RUST_CARGO_OPTS در این مرحله اعمال می‌شود
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-parallel --stacktrace

    # 12. آپلود فایل
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: slipstream-arm64-apk
        path: app/build/outputs/apk/debug/*.apk
