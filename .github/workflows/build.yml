
name: Build APK (ARM64 Final)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. دانلود سورس‌کد
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # 2. نصب جاوا 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 3. نصب SDK اندروید
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 4. نصب ابزارهای مورد نیاز
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build nasm pkg-config build-essential python3

    # 5. نصب CMake
    - name: Install Android CMake
      run: |
        sdkmanager --install "cmake;3.22.1"
        echo "$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH

    # 6. نصب NDK 26
    - name: Install NDK
      run: |
        yes | sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

    # 7. اصلاح فایل build.gradle.kts با اسکریپت پایتون (تضمینی)
    # این روش بسیار دقیق‌تر از sed عمل می‌کند و از خرابی فایل جلوگیری می‌کند
    - name: Fix build.gradle.kts logic
      shell: python
      run: |
        import re
        
        file_path = "app/build.gradle.kts"
        print(f"Reading {file_path}...")
        
        with open(file_path, "r") as f:
            content = f.read()
            
        # 1. غیرفعال کردن Splits (علت اصلی تداخل)
        # هر جا include(...) دیدیم کامنت می‌کنیم تا تداخل رفع شود
        content = re.sub(r'include\s*\(', '// include(', content)
        # ویژگی isEnable را فالس می‌کنیم
        content = content.replace('isEnable = true', 'isEnable = false')
        
        # 2. تنظیم نسخه NDK
        content = re.sub(r'ndkVersion\s*=.*', 'ndkVersion = "26.1.10909125"', content)
        
        # 3. اضافه کردن تنظیمات ARM64 به defaultConfig
        if 'abiFilters.add("arm64-v8a")' not in content:
            # این دستور ndk {...} را به ابتدای defaultConfig تزریق می‌کند
            replacement = 'defaultConfig {\n        ndk {\n            abiFilters.add("arm64-v8a")\n        }'
            content = content.replace('defaultConfig {', replacement)
            
        print("Writing modified content...")
        with open(file_path, "w") as f:
            f.write(content)
            
        print("Fix applied successfully!")

    # 8. نصب Rust برای معماری ARM64
    - name: Install Rust Targets
      run: rustup target add aarch64-linux-android

    # 9. مجوز اجرا
    - name: Grant execute permission
      run: chmod +x gradlew

    # 10. ساخت فایل APK
    # فلگ --stacktrace برای دیدن جزئیات خطای احتمالی
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    # 11. آپلود فایل خروجی
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: slipstream-arm64-apk
        path: app/build/outputs/apk/debug/*.apk
