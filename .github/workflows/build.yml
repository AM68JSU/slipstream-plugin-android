
name: Build APK (ARM64 Fixed)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. دانلود سورس‌کد
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # 2. نصب جاوا 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 3. نصب SDK اندروید
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 4. نصب ابزارهای مورد نیاز سیستم
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build nasm pkg-config build-essential

    # 5. نصب CMake
    - name: Install Android CMake
      run: |
        sdkmanager --install "cmake;3.22.1"
        echo "$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH

    # 6. نصب NDK 26
    - name: Install NDK
      run: |
        yes | sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

    # 7. اصلاح هوشمند فایل build.gradle.kts
    # استراتژی: غیرفعال کردن Splits به جای حذف آن و اضافه کردن فیلتر ARM64
    - name: Configure build.gradle.kts
      run: |
        echo "Modifying build.gradle.kts..."
        
        # تنظیم نسخه NDK
        sed -i 's/ndkVersion.*/ndkVersion = "26.1.10909125"/' app/build.gradle.kts
        
        # غیرفعال کردن Splits (تغییر true به false)
        # این کار باعث می‌شود تنظیمات splits نادیده گرفته شود و تداخل حل شود
        sed -i 's/isEnable = true/isEnable = false/g' app/build.gradle.kts
        
        # اضافه کردن فیلتر ARM64 به بخش defaultConfig
        # از دستور add استفاده می‌کنیم که در کاتلین مطمئن‌تر است
        sed -i '/defaultConfig {/a \        ndk { abiFilters.add("arm64-v8a") }' app/build.gradle.kts
        
        # چاپ محتویات فایل برای اطمینان از صحت تغییرات (فقط جهت دیباگ در لاگ‌ها)
        cat app/build.gradle.kts | grep -A 5 "defaultConfig"

    # 8. نصب Rust برای معماری ARM64
    - name: Install Rust Targets
      run: rustup target add aarch64-linux-android

    # 9. مجوز اجرا
    - name: Grant execute permission
      run: chmod +x gradlew

    # 10. ساخت فایل APK با لاگ کامل
    # --info کمک می‌کند اگر خطایی باشد دقیقاً متن آن را ببینیم
    - name: Build Debug APK
      run: ./gradlew assembleDebug --info --stacktrace

    # 11. آپلود فایل خروجی
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: slipstream-arm64-apk
        path: app/build/outputs/apk/debug/*.apk
