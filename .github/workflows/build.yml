name: Build APK (Swap Enabled)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # محدود کردن شدید حافظه جاوا به 2 گیگابایت (تا 5 گیگ برای Rust و سیستم بماند)
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false -Dkotlin.daemon.jvm.options=-Xmx1024m"
      # تک‌هسته‌ای کردن کامپایل Rust
      CARGO_BUILD_JOBS: "1"
      # کاهش مصرف رم کامپایلر Rust
      RUSTFLAGS: "-C codegen-units=1"

    steps:
    # 1. ایجاد حافظه مجازی (SWAP) - راه نجات از کرش کردن
    - name: Enable Swap Space
      run: |
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        sudo swapon --show

    # 2. دانلود سورس‌کد
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # 3. نصب جاوا 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 4. نصب SDK اندروید
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 5. نصب ابزارهای بیلد
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build nasm pkg-config build-essential python3

    # 6. نصب CMake پایدار
    - name: Install Android CMake
      run: |
        sdkmanager --install "cmake;3.22.1"
        echo "$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH

    # 7. نصب NDK پایدار
    - name: Install NDK
      run: |
        yes | sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

    # 8. اصلاح فایل build.gradle.kts با پایتون
    - name: Fix build.gradle.kts
      shell: python
      run: |
        import re
        file_path = "app/build.gradle.kts"
        
        with open(file_path, "r") as f:
            content = f.read()
        
        # اصلاح نسخه NDK
        content = re.sub(r'ndkVersion\s*=\s*".*"', 'ndkVersion = "26.1.10909125"', content)
        
        # غیرفعال کردن Splits (بسیار مهم)
        content = content.replace('isEnable = true', 'isEnable = false')
        
        # اضافه کردن فیلتر ARM64 اگر وجود نداشته باشد
        if 'abiFilters' not in content:
            content = content.replace('defaultConfig {', 'defaultConfig {\n        ndk { abiFilters += "arm64-v8a" }')
            
        with open(file_path, "w") as f:
            f.write(content)
        print("Build file patched successfully.")

    # 9. نصب Rust فقط برای ARM64
    - name: Install Rust Targets
      run: rustup target add aarch64-linux-android

    # 10. مجوز اجرا
    - name: Grant execute permission
      run: chmod +x gradlew

    # 11. ساخت فایل APK (بدون پارالل برای کاهش مصرف رم)
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-parallel --stacktrace

    # 12. آپلود فایل
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: slipstream-arm64-apk
        path: app/build/outputs/apk/debug/*.apk
