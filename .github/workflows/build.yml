name: Build APK (Memory Optimized)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # تنظیمات حیاتی برای مدیریت حافظه
    env:
      # محدود کردن حافظه جاوا و غیرفعال کردن Daemon
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3072m -Dorg.gradle.daemon=false"
      # جلوگیری از کامپایل همزمان چندین فایل Rust برای کاهش فشار روی رم (بسیار مهم)
      CARGO_BUILD_JOBS: "1"

    steps:
    # 1. دانلود سورس‌کد
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # 2. نصب جاوا 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 3. نصب SDK اندروید
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 4. نصب ابزارهای پیش‌نیاز
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build nasm pkg-config build-essential python3

    # 5. نصب CMake پایدار
    - name: Install Android CMake
      run: |
        sdkmanager --install "cmake;3.22.1"
        echo "$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH

    # 6. نصب NDK پایدار
    - name: Install NDK
      run: |
        yes | sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

    # 7. اصلاح فایل build.gradle.kts با پایتون
    - name: Fix build.gradle.kts
      shell: python
      run: |
        import re
        file_path = "app/build.gradle.kts"
        with open(file_path, "r") as f: content = f.read()
        
        # 1. تغییر نسخه NDK
        content = re.sub(r'ndkVersion\s*=\s*".*"', 'ndkVersion = "26.1.10909125"', content)
        # 2. غیرفعال کردن Splits
        content = content.replace('isEnable = true', 'isEnable = false')
        # 3. اضافه کردن فیلتر ARM64
        if 'abiFilters' not in content:
            content = content.replace('defaultConfig {', 'defaultConfig {\n        ndk { abiFilters += "arm64-v8a" }')

        with open(file_path, "w") as f: f.write(content)
        print("Build file modified for ARM64 and NDK26.")

    # 8. نصب Rust فقط برای ARM64
    - name: Install Rust Targets
      run: rustup target add aarch64-linux-android

    # 9. مجوز اجرا
    - name: Grant execute permission
      run: chmod +x gradlew

    # 10. ساخت فایل APK با تنظیمات ضد-کرش
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-parallel --stacktrace

    # 11. آپلود فایل نهایی
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: slipstream-arm64-apk
        path: app/build/outputs/apk/debug/*.apk
